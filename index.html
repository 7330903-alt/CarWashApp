<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мойки: Управление</title>

    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2563eb">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5cMCEUvjorxi6Nwr-783MFtnTq5dC4I4",
            authDomain: "carwashappw.firebaseapp.com",
            projectId: "carwashappw",
            storageBucket: "carwashappw.firebasestorage.app",
            messagingSenderId: "1039787275423",
            appId: "1:1039787275423:web:6a14edf2283c4ad2b01eaa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.currentSite = '';
        window.currentInfoSite = ''; // Для отслеживания, какую инфу правим

        // --- ЛОГИКА ИНФО-ПАНЕЛЕЙ ---
        window.openInfoSite = (site) => {
            window.currentInfoSite = site;
            document.getElementById('info-site-title').innerText = "ИНФО: " + site;
            document.getElementById('info-selection').classList.add('hidden');
            document.getElementById('info-content').classList.remove('hidden');
            
            // Подписываемся на документ конкретной мойки
            const docRef = doc(db, "settings", "info_" + site);
            onSnapshot(docRef, (docSnap) => {
                const text = docSnap.exists() ? docSnap.data().content : "Данные не заполнены. Нажмите правку...";
                document.getElementById('info-display-text').innerText = text;
                document.getElementById('edit-info-input').value = text;
            });
        };

        window.saveGeneralInfo = async () => {
            const docRef = doc(db, "settings", "info_" + window.currentInfoSite);
            await setDoc(docRef, { content: document.getElementById('edit-info-input').value });
            window.toggleInfoEdit(false);
        };

        // --- ЛОГИКА ЗАДАЧ ---
        window.addTask = async () => {
            const title = document.getElementById('input-task').value.trim();
            const desc = document.getElementById('input-desc').value.trim();
            if(!title) return;
            await addDoc(collection(db, "tasks"), {
                text: title,
                description: desc,
                site: window.currentSite,
                createdAt: Date.now()
            });
            document.getElementById('input-task').value = '';
            document.getElementById('input-desc').value = '';
            window.closeModal('modal-add');
        };

        window.saveEditedTask = async () => {
            const title = document.getElementById('edit-task-title').value.trim();
            const desc = document.getElementById('edit-task-desc').value.trim();
            if(!title) return;
            await updateDoc(doc(db, "tasks", window.editingTaskId), { text: title, description: desc });
            window.closeModal('modal-detail');
        };

        window.deleteTask = async (id) => {
            if(confirm("Удалить?")) await deleteDoc(doc(db, "tasks", id));
        };

        window.loadTasks = (site) => {
            const q = query(collection(db, "tasks"), where("site", "==", site));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('task-list');
                list.innerHTML = '';
                snapshot.forEach((doc) => {
                    const task = doc.data();
                    const item = document.createElement('div');
                    item.className = 'bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-3 flex justify-between items-center active:bg-gray-50';
                    item.innerHTML = `
                        <div class="flex-grow pr-4" onclick="window.showDetails('${doc.id}', '${task.text.replace(/'/g, "\\'")}', '${(task.description || '').replace(/'/g, "\\'").replace(/\n/g, " ")}')">
                            <span class="text-lg font-bold text-gray-800 block">${task.text}</span>
                            ${task.description ? '<span class="text-xs text-blue-500 font-bold uppercase">Детали →</span>' : ''}
                        </div>
                        <button onclick="event.stopPropagation(); window.deleteTask('${doc.id}')" class="text-red-300 text-2xl p-2">✕</button>
                    `;
                    list.appendChild(item);
                });
            });
        };

        window.showDetails = (id, title, desc) => {
            window.editingTaskId = id;
            document.getElementById('detail-view').classList.remove('hidden');
            document.getElementById('detail-edit').classList.add('hidden');
            document.getElementById('detail-title-text').innerText = title;
            document.getElementById('detail-desc-text').innerText = desc || "Нет описания";
            document.getElementById('edit-task-title').value = title;
            document.getElementById('edit-task-desc').value = desc;
            window.openModal('modal-detail');
        };
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <div id="screen-main" class="p-6 max-w-md mx-auto text-center">
        <h1 class="text-3xl font-black mb-8 mt-8 tracking-tighter uppercase">Мойки: Управление</h1>
        <div class="space-y-4">
            <button onclick="openWash('Королев')" class="w-full h-32 bg-blue-600 rounded-[2rem] shadow-lg text-white text-3xl font-bold">КОРОЛЕВ</button>
            <button onclick="openWash('Медведково')" class="w-full h-32 bg-indigo-700 rounded-[2rem] shadow-lg text-white text-3xl font-bold">МЕДВЕДКОВО</button>
            <button onclick="window.openModal('modal-info-select')" class="w-full py-6 bg-white border-2 border-gray-200 rounded-[2rem] text-gray-600 font-black text-xl flex items-center justify-center gap-3">ℹ️ ИНФОРМАЦИЯ</button>
        </div>
    </div>

    <div id="screen-tasks" class="hidden min-h-screen flex flex-col">
        <div class="p-4 bg-white border-b flex items-center justify-between sticky top-0 z-20 shadow-sm">
            <button onclick="location.reload()" class="text-blue-600 font-bold text-lg p-2">←</button>
            <h2 id="title-wash" class="font-black text-xl uppercase tracking-widest text-gray-800"></h2>
            <div class="w-10"></div>
        </div>
        <div id="task-list" class="p-4 flex-grow overflow-y-auto"></div>
        <div class="p-6 bg-white border-t sticky bottom-0">
            <button onclick="window.openModal('modal-add')" class="w-full py-5 bg-black text-white rounded-2xl font-bold text-xl">+ ЗАДАЧА</button>
        </div>
    </div>

    <div id="modal-info-select" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <div id="info-selection">
                <h3 class="text-2xl font-black mb-6 text-center">Какая мойка?</h3>
                <div class="space-y-3">
                    <button onclick="window.openInfoSite('Королев')" class="w-full py-5 bg-blue-50 text-blue-600 rounded-2xl font-bold text-xl uppercase">Королев</button>
                    <button onclick="window.openInfoSite('Медведково')" class="w-full py-5 bg-indigo-50 text-indigo-700 rounded-2xl font-bold text-xl uppercase">Медведково</button>
                    <button onclick="window.closeModal('modal-info-select')" class="w-full py-4 text-gray-400 font-bold">ОТМЕНА</button>
                </div>
            </div>

            <div id="info-content" class="hidden">
                <h3 id="info-site-title" class="text-xl font-black mb-4 uppercase text-gray-400"></h3>
                <div id="info-view-mode">
                    <div id="info-display-text" class="text-gray-800 mb-8 whitespace-pre-wrap max-h-64 overflow-y-auto text-lg leading-relaxed text-left border-t pt-4"></div>
                    <div class="flex gap-3">
                        <button onclick="document.getElementById('info-selection').classList.remove('hidden'); document.getElementById('info-content').classList.add('hidden');" class="flex-1 py-4 bg-gray-100 rounded-xl font-bold text-sm">НАЗАД</button>
                        <button onclick="window.toggleInfoEdit(true)" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold text-sm">ПРАВИТЬ</button>
                    </div>
                </div>
                <div id="info-edit-mode" class="hidden">
                    <textarea id="edit-info-input" class="w-full h-64 p-4 bg-gray-50 border rounded-2xl mb-4 outline-none focus:ring-2 ring-blue-500"></textarea>
                    <div class="flex gap-3">
                        <button onclick="window.toggleInfoEdit(false)" class="flex-1 py-4 font-bold text-gray-400">ОТМЕНА</button>
                        <button onclick="window.saveGeneralInfo()" class="flex-1 py-4 bg-green-600 text-white rounded-xl font-bold">СОХРАНИТЬ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-add" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8">
            <h3 class="text-xl font-bold mb-4">Новая задача</h3>
            <input id="input-task" type="text" class="w-full p-4 bg-gray-100 rounded-xl mb-3 outline-none" placeholder="Заголовок">
            <textarea id="input-desc" class="w-full p-4 bg-gray-100 rounded-xl mb-6 h-32 outline-none" placeholder="Подробности..."></textarea>
            <div class="flex gap-3"><button onclick="window.closeModal('modal-add')" class="flex-1 py-4 font-bold text-gray-400">ОТМЕНА</button><button onclick="window.addTask()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold">ОК</button></div>
        </div>
    </div>

    <div id="modal-detail" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-left">
            <div id="detail-view">
                <h3 id="detail-title-text" class="text-2xl font-black mb-4 text-blue-600"></h3>
                <p id="detail-desc-text" class="text-gray-700 text-lg leading-relaxed mb-8 whitespace-pre-wrap border-t pt-4"></p>
                <div class="flex gap-3"><button onclick="window.closeModal('modal-detail')" class="flex-1 py-4 bg-gray-100 rounded-xl font-bold">ЗАКРЫТЬ</button><button onclick="document.getElementById('detail-view').classList.add('hidden'); document.getElementById('detail-edit').classList.remove('hidden');" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold">ПРАВИТЬ</button></div>
            </div>
            <div id="detail-edit" class="hidden">
                <input id="edit-task-title" type="text" class="w-full p-4 bg-gray-100 rounded-xl mb-3 outline-none border">
                <textarea id="edit-task-desc" class="w-full h-44 p-4 bg-gray-100 rounded-xl mb-6 outline-none border"></textarea>
                <div class="flex gap-3"><button onclick="document.getElementById('detail-view').classList.remove('hidden'); document.getElementById('detail-edit').classList.add('hidden');" class="flex-1 py-4 font-bold text-gray-400 text-sm uppercase">Назад</button><button onclick="window.saveEditedTask()" class="flex-1 py-4 bg-green-600 text-white rounded-xl font-bold text-sm uppercase">Сохранить</button></div>
            </div>
        </div>
    </div>

    <script>
        function openWash(site) {
            window.currentSite = site;
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-tasks').classList.remove('hidden');
            document.getElementById('title-wash').innerText = site;
            window.loadTasks(site);
        }
        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => {
            document.getElementById(id).classList.add('hidden');
            // Сброс окон внутри модалки инфо при закрытии
            if(id === 'modal-info-select') {
                document.getElementById('info-selection').classList.remove('hidden');
                document.getElementById('info-content').classList.add('hidden');
            }
        };
        window.toggleInfoEdit = (isEdit) => {
            document.getElementById('info-view-mode').classList.toggle('hidden', isEdit);
            document.getElementById('info-edit-mode').classList.toggle('hidden', !isEdit);
        };
    </script>
</body>
</html>
