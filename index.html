<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мойки: Управление</title>

    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5cMCEUvjorxi6Nwr-783MFtnTq5dC4I4",
            authDomain: "carwashappw.firebaseapp.com",
            projectId: "carwashappw",
            storageBucket: "carwashappw.firebasestorage.app",
            messagingSenderId: "1039787275423",
            appId: "1:1039787275423:web:6a14edf2283c4ad2b01eaa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.currentSite = '';

        // Исправленная функция добавления
        window.addTask = async () => {
            const input = document.getElementById('input-task');
            const text = input.value.trim();
            
            if(!text) {
                alert("Введите текст задачи");
                return;
            }

            try {
                await addDoc(collection(db, "tasks"), {
                    text: text,
                    site: window.currentSite,
                    createdAt: Date.now()
                });
                input.value = '';
                window.closeModal();
            } catch (e) {
                console.error("Ошибка Firebase:", e);
                alert("Ошибка сохранения! Проверьте вкладку Rules в Firebase Console.");
            }
        };

        window.deleteTask = async (id) => {
            if(confirm("Удалить задачу?")) {
                try {
                    await deleteDoc(doc(db, "tasks", id));
                } catch (e) {
                    alert("Ошибка при удалении");
                }
            }
        };

        window.loadTasks = (site) => {
            const q = query(collection(db, "tasks"), where("site", "==", site));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('task-list');
                list.innerHTML = '';
                snapshot.forEach((doc) => {
                    const task = doc.data();
                    const item = document.createElement('div');
                    item.className = 'bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center mb-3 animate-fade-in';
                    item.innerHTML = `
                        <span class="text-lg font-medium text-gray-800">${task.text}</span>
                        <button onclick="window.deleteTask('${doc.id}')" class="p-2 text-red-400 text-2xl active:scale-75 transition-transform">✕</button>
                    `;
                    list.appendChild(item);
                });
            });
        };
    </script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    
    <div id="screen-main" class="p-6 max-w-md mx-auto">
        <h1 class="text-3xl font-black text-center mb-10 mt-8 tracking-tighter text-gray-900">АВТОМОЙКИ</h1>
        <div class="space-y-6">
            <button onclick="openWash('Королев')" class="w-full h-44 bg-blue-600 rounded-[2.5rem] shadow-xl text-white active:scale-95 transition-all flex items-center justify-center">
                <span class="text-4xl font-bold tracking-tight">КОРОЛЕВ</span>
            </button>
            <button onclick="openWash('Медведково')" class="w-full h-44 bg-indigo-700 rounded-[2.5rem] shadow-xl text-white active:scale-95 transition-all flex items-center justify-center">
                <span class="text-4xl font-bold tracking-tight text-center uppercase">Медведково</span>
            </button>
        </div>
    </div>

    <div id="screen-tasks" class="hidden min-h-screen flex flex-col bg-gray-50">
        <div class="p-4 bg-white border-b flex items-center justify-between sticky top-0 z-20 shadow-sm">
            <button onclick="location.reload()" class="text-blue-600 font-bold p-2 text-lg">← Назад</button>
            <h2 id="title-wash" class="font-black text-xl uppercase tracking-widest text-gray-800"></h2>
            <div class="w-10"></div>
        </div>
        
        <div id="task-list" class="p-4 flex-grow overflow-y-auto"></div>

        <div class="p-6 bg-white border-t sticky bottom-0">
            <button onclick="openModal()" class="w-full py-5 bg-black text-white rounded-2xl font-bold text-xl shadow-2xl active:scale-95 transition-all">
                + НОВАЯ ЗАДАЧА
            </button>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 z-50">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl scale-in">
            <h3 class="text-xl font-bold mb-6 text-center text-gray-800">Что нужно сделать?</h3>
            <input id="input-task" type="text" 
                   class="w-full p-5 bg-gray-100 rounded-2xl mb-6 text-lg outline-none focus:ring-2 ring-blue-500 border-none" 
                   placeholder="Например: Заказать пену" autocomplete="off">
            <div class="flex gap-4">
                <button type="button" onclick="window.closeModal()" class="flex-1 py-4 font-bold text-gray-400">ОТМЕНА</button>
                <button type="button" onclick="window.addTask()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold shadow-lg active:scale-95 transition-all">ОК</button>
            </div>
        </div>
    </div>

    <script>
        function openWash(site) {
            window.currentSite = site;
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-tasks').classList.remove('hidden');
            document.getElementById('title-wash').innerText = site;
            window.loadTasks(site);
        }
        function openModal() { 
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('input-task').focus();
        }
        window.closeModal = function() { 
            document.getElementById('modal').classList.add('hidden'); 
        }
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scale-in { animation: scaleIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</body>
</html>
